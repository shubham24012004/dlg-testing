version: 0.2

# Required CodeBuild environment variables:
#   AWS_DEFAULT_REGION   - e.g. ap-south-1
#   ECR_REPOSITORY_NAME  - ECR repository name, e.g. dlg-analysis

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      - ECR_REGISTRY=$ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY
      - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - IMAGE_TAG=${COMMIT_HASH:=latest}
      - echo ECR registry $ECR_REGISTRY repository $ECR_REPOSITORY_NAME tag $IMAGE_TAG

  build:
    commands:
      - echo Build started on $(date)
      - docker build -t $ECR_REGISTRY/$ECR_REPOSITORY_NAME:latest .
      - docker tag $ECR_REGISTRY/$ECR_REPOSITORY_NAME:latest $ECR_REGISTRY/$ECR_REPOSITORY_NAME:$IMAGE_TAG

  post_build:
    commands:
      - echo Build completed on $(date)
      - docker push $ECR_REGISTRY/$ECR_REPOSITORY_NAME:latest
      - docker push $ECR_REGISTRY/$ECR_REPOSITORY_NAME:$IMAGE_TAG
      - printf '[{"name":"dlg-analysis","imageUri":"%s"}]' $ECR_REGISTRY/$ECR_REPOSITORY_NAME:$IMAGE_TAG > imagedefinitions.json
      - echo Image pushed $ECR_REGISTRY/$ECR_REPOSITORY_NAME:$IMAGE_TAG

artifacts:
  files:
    - imagedefinitions.json
